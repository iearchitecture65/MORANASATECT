            // --- ฟังก์ชันสำหรับตรวจสอบและตั้งเวลาเซสชัน (Dynamic Session Timeout) ---
            setupSessionTimeout: function() {
                // ล้าง Timeout เดิมออกก่อน (ถ้ามี)
                if (app.guestTimeoutId) {
                    clearTimeout(app.guestTimeoutId);
                    app.guestTimeoutId = null;
                }
                if (app.sessionTimeoutId) {
                    clearTimeout(app.sessionTimeoutId);
                    app.sessionTimeoutId = null;
                }
                
                if (!app.profile || !app.profile.loginTime) return;

                let applySession = false;
                // ตรวจสอบจากตั้งค่า ว่ากลุ่มผู้ใช้งานปัจจุบันตรงกับเงื่อนไขที่ให้เปิดใช้เซสชันหรือไม่
                if (app.profile.role === 'guest' && app.settings.sessionApplyGuest !== false) applySession = true;
                if (app.profile.role === 'student' && app.settings.sessionApplyStudent === true) applySession = true;
                if (app.profile.role === 'admin' && app.settings.sessionApplyAdmin === true) applySession = true;

                if (applySession) {
                    const durationHours = app.settings.sessionDurationHours !== undefined ? parseFloat(app.settings.sessionDurationHours) : 2;
                    const durationMs = durationHours * 60 * 60 * 1000;
                    const timeLeft = durationMs - (Date.now() - app.profile.loginTime);

                    if (timeLeft <= 0) {
                        // หากเวลาหมดไปแล้ว ให้เคลียร์ข้อมูลและบังคับล็อกเอาต์
                        localStorage.removeItem('moranasatect_profile');
                        app.profile = null;

                            app.logout();
                            window.location.reload();
                        });
                    } else {
                        // ตั้งเวลาให้ล็อกเอาต์ตามระยะเวลาที่เหลือ
                        app.sessionTimeoutId = setTimeout(() => {
                            app.swal.fire('หมดเวลาเข้าใช้งาน', 'เซสชันของคุณหมดอายุ กรุณาเข้าสู่ระบบใหม่ครับ', 'info').then(() => {
                                app.logout();
                                window.location.reload();
                            });
                        }, timeLeft);
                    }
                }
            },

            fetchThesisData: async function() {
                try {
                    const res = await fetch(SHEET_CSV_URL + "&t=" + Date.now());
                    const csvText = await res.text();
                    const parsed = app.parseCSV(csvText);
                    
                    if (parsed.length > 1) {
                        const headers = parsed[0];
                        const dataRows = parsed.slice(1);
                        
                        const prefixes = ['1.1', '1.2', '1.3', '2.1', '2.2', '2.3', '2.4', '3.1', '3.2', '3.3', '4.1', '5.1', '5.2', '5.3', '5.4', '9.1'];
                        const headerMap = {};
                        prefixes.forEach(p => headerMap[p] = []);

                        headers.forEach((header, index) => {
                            prefixes.forEach(p => { 
                                const regex = new RegExp(`(^|\\s)${p}(\\s|:|\\.|$)`);
                                if (regex.test(header)) headerMap[p].push(index); 
                            });
                        });
                        
                        app.thesisData = dataRows.map(row => {
                            let obj = {};
                            prefixes.forEach(p => {
                                let values = headerMap[p].map(idx => row[idx] ? row[idx].trim() : '').filter(v => v !== '');
                                obj[p] = values.join('\n\n'); 
                            });
                            
                            obj.studentId = obj['1.1'];
                            obj.name = obj['1.2'];
                            obj.personalInfo = obj['1.3'];
                            obj.title = obj['2.1'];
                            obj.advisor = obj['2.2'];
                            obj.category = obj['2.3'];
                            obj.description = obj['2.4'];
                            obj.coverImg = obj['3.1'];
                            obj.portfolioImgs = obj['3.3'];
                            obj.videoUrl = obj['4.1'];
                            obj.facebook = obj['5.1'];
                            obj.instagram = obj['5.2'];
                            obj.otherContact = [obj['5.3'], obj['5.4']].filter(Boolean).join('\n');
                            obj.thesisBook = obj['9.1'];
                            
                            obj.raw = {
                                '1.1': obj['1.1'], '1.2': obj['1.2'], '1.3': obj['1.3'],
                                '2.1': obj['2.1'], '2.2': obj['2.2'], '2.3': obj['2.3'], '2.4': obj['2.4'],
                                '3.1': obj['3.1'], '3.2': obj['3.2'], '3.3': obj['3.3'],
                                '4.1': obj['4.1'], '9.1': obj['9.1']
                            };
                            return obj;
                        }).filter(r => r.studentId);

                        // เรียกอัปเดตเมนูอีกครั้งหลังจากได้ข้อมูล Categories และ Advisors
                        app.updateMenuVisibility();
                    }
                } catch (e) {
                    console.error("CSV Fetch Error", e);
                }
            },

            parseCSV: function(str) {
                const arr = [];
                let quote = false;
                let row = 0, col = 0;
                for (let c = 0; c < str.length; c++) {
                    let cc = str[c], nc = str[c+1];
                    arr[row] = arr[row] || [];
                    arr[row][col] = arr[row][col] || '';
                    if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                    if (cc == '"') { quote = !quote; continue; }
                    if (cc == ',' && !quote) { ++col; continue; }
                    if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                    if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                    if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                    arr[row][col] += cc;
                }
                return arr;
            },

            getCategories: function() {
                // ดึงหมวดหมู่ที่ไม่ซ้ำจากข้อมูล
                const cats = new Set();
                app.thesisData.forEach(d => {
                    if (d.category) {
                        // ตัดช่องว่างและตัวอักษรพิเศษที่ไม่จำเป็น
                        cats.add(d.category.trim());
                    }
                });
                return Array.from(cats).sort();
            },

            formatCategoryMenu: function(rawCat) {
                // จัดรูปแบบ "1. Urban architecture (สถาปัตยกรรมผังเมือง)"
                let clean = rawCat.replace(/^\d+\.\s*/, '').trim();
                let eng = clean;
                let thai = "";
                let match = clean.match(/^(.*?)\((.*?)\)$/);
                
                if (match) {
                    eng = match[1].trim();
                    thai = match[2].trim();
                    return `<div class="flex flex-col"><span class="text-sm font-bold text-white leading-tight">${eng}</span><span class="text-[10px] text-gray-400 font-medium">${thai}</span></div>`;
                }
                return `<span class="text-sm font-bold text-white">${eng}</span>`;
            },

            logVisit: async function(studentId, isFromDashboardMenu = false) {
                if(!app.user || !app.profile) return;
                
                // 1. Admin ไม่บันทึกการเข้าชม
                if (app.profile.role === 'admin') return;
                
                // 2. นักศึกษาดูผลงานตัวเองจากปุ่มใน Dashboard หรือ เมนู ไม่บันทึก
                if (app.profile.role === 'student' && app.profile.uid === studentId && isFromDashboardMenu) {
                    return;
                }

                try {
                    const ref = doc(db, 'artifacts', appId, 'public', 'data', 'visits', studentId);
                    const snap = await getDoc(ref);
                    if (snap.exists()) {
                        await updateDoc(ref, { count: (snap.data().count || 0) + 1 });
                    } else {
                        await setDoc(ref, { count: 1 });
                    }
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'access_logs'), {
                        uid: app.profile.uid,
                        name: app.profile.name,
                        role: app.profile.role,
                        action: 'view_exhibit',
                        target: studentId,
                        timestamp: Date.now()
                    });
                } catch(e) {}
            },

                try {

            closeMenu: function() {
                app.isMenuOpen = false;
                const menu = document.getElementById('mobileDropdown');
                const icon = document.querySelector('#navHamburger i');
                const wrapper = document.getElementById('mainContentWrapper');
                
                if(menu) {
                    menu.classList.add('hidden');
                    menu.classList.remove('flex');
                }
                if(icon) {
                    icon.classList.remove('fa-xmark');
                    icon.classList.add('fa-bars');
                }
                if(wrapper) wrapper.classList.remove('menu-open-blur');
            },

            toggleMenuAccordion: function(id) {
                const el = document.getElementById(id);
                const icon = document.getElementById(`icon-${id}`);
                if (el) {
                    el.classList.toggle('hidden');
                    el.classList.toggle('flex');
                    if (icon) {
                        if (el.classList.contains('hidden')) {
                            icon.classList.remove('rotate-180');
                        } else {
                            icon.classList.add('rotate-180');
                        }
                    }
                }
            },

            updateMenuVisibility: function() {
                const hamBtn = document.getElementById('navHamburger');
                const loginBtn = document.getElementById('navLoginBtn');
                const guestLogoutBtn = document.getElementById('navGuestLogout');
                
                const secPublic = document.getElementById('menuPublicSection');
                const secAdmin = document.getElementById('menuAdminSection');
                const secStudent = document.getElementById('menuStudentSection');
                const secIframe = document.getElementById('menuIframeSection');
                const iframeContainer = document.getElementById('menuIframeLinks');
                
                const logoutDivider = document.getElementById('logoutDivider');
                const menuLogoutBtn = document.getElementById('menuLogoutBtn');
                
                if (!hamBtn) return;

                // --- ซ่อนปุ่ม Header อัตโนมัติเมื่ออยู่หน้า Loading / Login / OTP / Guest Register ---
                if (['loading', 'login', 'otp', 'guest_register'].includes(app.view)) {
                    if (loginBtn) loginBtn.classList.add('hidden');
                    if (hamBtn) hamBtn.classList.add('hidden');
                    if (guestLogoutBtn) guestLogoutBtn.classList.add('hidden');
                    app.closeMenu(); // ปิดเมนูทุกครั้ง
                    return; 
                }

                // สร้างเมนู Advisors
                const advContainer = document.getElementById('advisorAccordion');
                if (advContainer) {
                    advContainer.innerHTML = window.advisorsData.map(a => `
                        <button onclick="app.showView('home', {type: 'advisor', value: '${a.id}'})" class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-white/10 transition-colors text-left text-sm text-gray-300 hover:text-white">
                            <i class="fa-solid fa-caret-right text-[10px] text-secondary"></i> ${a.name}
                        </button>
                    `).join('');
                }

                // สร้างเมนู Categories
                const catContainer = document.getElementById('categoryAccordion');
                if (catContainer && app.thesisData.length > 0) {
                    const categories = app.getCategories();
                    catContainer.innerHTML = categories.map(c => `
                        <button onclick="app.showView('home', {type: 'category', value: '${c}'})" class="flex items-start gap-3 px-3 py-2 rounded-xl hover:bg-white/10 transition-colors text-left text-gray-300 hover:text-white">
                            <i class="fa-solid fa-caret-right text-[10px] text-secondary mt-1.5 shrink-0"></i>
                            ${app.formatCategoryMenu(c)}
                        </button>
                    `).join('');
                }

                if (app.profile) {
                    // หาก Login แล้ว ซ่อนปุ่ม Login ใหญ่
                    if (loginBtn) loginBtn.classList.add('hidden');
                    if (hamBtn) hamBtn.classList.remove('hidden');

                    if (app.profile.role === 'guest') {
                        if (secAdmin) secAdmin.classList.add('hidden');
                        if (secStudent) secStudent.classList.add('hidden');
                        if (secPublic) secPublic.classList.remove('hidden');
                        if (logoutDivider) logoutDivider.classList.remove('hidden');
                        if (menuLogoutBtn) menuLogoutBtn.classList.remove('hidden');
                    } else {
                        // แอดมิน หรือ นักศึกษา
                        if (secAdmin) secAdmin.classList.toggle('hidden', app.profile.role !== 'admin');
                        if (secStudent) secStudent.classList.toggle('hidden', app.profile.role !== 'student');
                        
                        // การแสดง Public Menu สำหรับนักศึกษา ขึ้นอยู่กับการตั้งค่าของแอดมิน
                        if (secPublic) {
                            if (app.profile.role === 'admin') {
                                secPublic.classList.remove('hidden');
                            } else if (app.profile.role === 'student') {
                                secPublic.classList.toggle('hidden', app.settings.isHomeMenuForStudentOpen === false);
                            }
                        }

                        if (logoutDivider) logoutDivider.classList.remove('hidden');
                        if (menuLogoutBtn) menuLogoutBtn.classList.remove('hidden');
                    }
                } else {
                    // หากยังไม่ได้ Login (คนนอก)
                    if (loginBtn) loginBtn.classList.remove('hidden');
                    if (hamBtn) hamBtn.classList.remove('hidden'); // แสดงแฮมเบอร์เกอร์ให้เห็น Public Menu
                    
                    if (secAdmin) secAdmin.classList.add('hidden');
                    if (secStudent) secStudent.classList.add('hidden');
                    if (secPublic) secPublic.classList.remove('hidden'); // แสดงเมนูรวมผลงาน
                    
                    if (logoutDivider) logoutDivider.classList.add('hidden');
                    if (menuLogoutBtn) menuLogoutBtn.classList.add('hidden');
                }

                // เมนู iframe สำหรับทุกคนที่เห็นเมนูได้
                if (iframeContainer) {
                    iframeContainer.innerHTML = '';
                    const sites = app.settings.embeddedSites || [];
                    let iframeCount = 0;
                    sites.forEach((site, idx) => {
                        let canSee = false;
                        // ให้เห็นได้เฉพาะ Admin หรือ Student เท่านั้น
                        if (app.profile) {
                            if (app.profile.role === 'admin') canSee = true;
                            else if (app.profile.role === 'student') canSee = site.showToStudents;
                        }

                        if (canSee) {
                            iframeContainer.innerHTML += `
                                <button onclick="app.showView('iframe_view', ${idx})" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10 transition-colors text-left font-bold text-sm text-white">
                                    <i class="fa-solid fa-arrow-up-right-from-square w-5 text-center text-secondary"></i> ${site.title}
                                </button>
                            `;
                            iframeCount++;
                        }
                    });
                    if (secIframe) {
                        if (iframeCount > 0) {
                            secIframe.classList.remove('hidden');
                        } else {
                            secIframe.classList.add('hidden');
                        }
                    }
                }
            },

            formatName: function(name) {
                if (!name) return '';
                return name.replace(/^(ศ\.ดร\.|รศ\.ดร\.|ผศ\.ดร\.|ดร\.|รศ\.|ผศ\.|อ\.|นาย|นางสาว|นาง)\s*/g, '').trim();
            },
            
            getAbbr: function(name) {
                if (!name) return '';
                const formatted = app.formatName(name);
                const firstName = formatted.split(' ')[0]; 
                const consonants = firstName.replace(/[^ก-ฮ]/g, '');
                if (consonants.length >= 2) return consonants.substring(0, 2);
                if (consonants.length === 1) return consonants;
                return firstName.substring(0, 2); 
            },

            formatThesisTitle: function(title, isCard = false) {
                const thaiSize = isCard ? "text-xs md:text-sm" : "text-xl md:text-2xl";
                const engSize = isCard ? "text-[9px] md:text-[10px] mt-0.5" : "text-sm md:text-base mt-2";
                
                if (!title) return `<span class="${thaiSize} font-black block">กำลังจัดทำวิทยานิพนธ์</span>`;
                let parts = title.split('\n');
                if (parts.length > 1) {
                    return `<span class="${thaiSize} font-black block leading-snug">${parts[0]}</span><span class="block ${engSize} text-gray-400 font-medium">${parts.slice(1).join(' ')}</span>`;
                }
                const bracketMatch = title.match(/^(.*?)(\([^)]+\))$/);
                if (bracketMatch) {
                    return `<span class="${thaiSize} font-black block leading-snug">${bracketMatch[1].trim()}</span><span class="block ${engSize} text-gray-400 font-medium">${bracketMatch[2].trim()}</span>`;
                }
                const engMatch = title.match(/([a-zA-Z0-9\s\-:,'".&]+)$/);
                if (engMatch && engMatch[1].trim().length > 3 && engMatch[1].trim() !== title.trim()) {
                    const thaiPart = title.replace(engMatch[1], '').trim();
                    const engPart = engMatch[1].trim();
                    if (thaiPart) {
                        return `<span class="${thaiSize} font-black block leading-snug">${thaiPart}</span><span class="block ${engSize} text-gray-400 font-medium">${engPart}</span>`;
                    }
                }
                return `<span class="${thaiSize} font-black block leading-snug">${title}</span>`;
            },

            sharePublicLink: async function(studentId) {
                if (app.settings.isSharingOpen === false) {
                    return app.swal.fire({
                        title: 'ระบบปิดการแชร์',
                        text: 'ขณะนี้ผู้ดูแลระบบได้ปิดการแชร์ลิงก์ชั่วคราวครับ',
                        icon: 'warning',
                        confirmButtonText: 'ตกลง'
                    });
                }

                const user = window.predefinedUsers.find(u => u.studentId === studentId);
                const data = app.thesisData.find(d => d.studentId === studentId) || {};
                let link = "";
                
                // ตรวจสอบว่าในระบบตั้งค่าลิงก์ย่อไว้หรือไม่ ถ้ามีให้ใช้ลิงก์ย่อ พร้อมเช็ค http://
                if (user && user.shortLink) {
                    link = user.shortLink.trim();
                    if (!link.startsWith('http')) link = 'https://' + link;
                } else {
                    let basePath = window.location.href.split('?')[0].replace(/index\.html$/, '');
                    if (!basePath.endsWith('/')) basePath += '/';
                    link = `${basePath}Exhibition/${studentId}.html`;
                }
                
                // จัดเตรียมข้อความสำหรับแชร์
                let rawTitle = data.title || (user ? user.thesisTitle : 'ไม่มีชื่อโครงการ');
                let thaiTitle = rawTitle.split('\n')[0];
                const bracketMatch = thaiTitle.match(/^(.*?)(\([^)]+\))$/);
                if (bracketMatch) thaiTitle = bracketMatch[1].trim();
                const engMatch = thaiTitle.match(/([a-zA-Z0-9\s\-:,'".&]+)$/);
                if (engMatch && engMatch[1].trim().length > 3 && engMatch[1].trim() !== thaiTitle.trim()) {
                    thaiTitle = thaiTitle.replace(engMatch[1], '').trim();
                }
                if(!thaiTitle) thaiTitle = 'ไม่มีชื่อโครงการ';

                const shareTextObj = `ชมนิทรรศการผลงานวิทยานิพนธ์\nMORANASATECT - Thesis Exhibition\n\n${thaiTitle}`;

                    }).then((result) => {
                        if (result.isConfirmed) {
                            const input = document.getElementById('copyLinkInput');
                            if(input) {
                                input.select();
                                document.execCommand('copy');
                                app.swal.fire({ title: 'คัดลอกสำเร็จ!', text: 'นำไปแชร์ได้เลย', iconHtml: '<i class="fa-solid fa-circle-check text-secondary text-5xl"></i>', timer: 1500, showConfirmButton: false });
                            }
                        }
                    });
                };

                const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

                if (navigator.share && isMobile) {
                    try { 
                        await navigator.share({ 
                            title: 'MORANASATECT - Thesis Exhibition', 
                            text: fullClipboardText

                    } catch(e) {
                        if (e.name !== 'AbortError') showFallbackCopy();
                    }
                } else {
                    showFallbackCopy(); // บังคับให้ PC เด้งหน้าจอ Copy ข้อความเสมอ
                }
            },

            showDesignerInfo: function(studentId) {
                const user = window.predefinedUsers.find(u => u.studentId === studentId);
                const data = app.thesisData.find(d => d.studentId === studentId) || {};
                const cleanName = app.formatName(data.name || user.name);
                const abbr = app.getAbbr(cleanName);
                
                let rawContactInfo = data.personalInfo || '';
                let contactHtml = '';
                let personalText = '';

                if (rawContactInfo) {
                    contactHtml += `<div class="flex flex-wrap gap-2 justify-center mt-3 w-full">`;
                    const lines = rawContactInfo.split('\n').map(l => l.trim()).filter(l => l);
                    
                    lines.forEach(line => {
                        const lowerLine = line.toLowerCase();
                        let digitsOnly = line.replace(/\D/g, '');

                        if (lowerLine.includes('ig') || lowerLine.includes('instagram')) {
                            let igHandle = line.replace(/^.*?(ig|instagram)[\s:\-\.]*/i, '').trim();
                            let igLink = igHandle.includes('http') ? igHandle : `https://instagram.com/${igHandle.replace(/^[@\s]+/, '')}`;
                            contactHtml += `<a href="${igLink}" target="_blank" class="bg-gradient-to-r from-[#833ab4]/20 via-[#fd1d1d]/20 to-[#fcb045]/20 hover:from-[#833ab4]/40 hover:via-[#fd1d1d]/40 hover:to-[#fcb045]/40 text-[#ff7b9c] border border-[#E4405F]/30 px-3 py-1.5 rounded-lg text-[10px] font-bold transition-all hover:-translate-y-0.5 flex items-center gap-1.5"><i class="fa-brands fa-instagram text-sm"></i> ${igHandle}</a>`;
                        } else if (lowerLine.includes('fb') || lowerLine.includes('facebook')) {
                            let fbHandle = line.replace(/^.*?(fb|facebook)[\s:\-\.]*/i, '').trim();
                            let fbLink = fbHandle.includes('http') ? fbHandle : `https://www.facebook.com/search/top/?q=${encodeURIComponent(fbHandle)}`;
                            contactHtml += `<a href="${fbLink}" target="_blank" class="bg-[#1877F2]/20 hover:bg-[#1877F2]/40 text-[#1877F2] border border-[#1877F2]/30 px-3 py-1.5 rounded-lg text-[10px] font-bold transition-all hover:-translate-y-0.5 flex items-center gap-1.5"><i class="fa-brands fa-facebook text-sm"></i> ${fbHandle}</a>`;
                        } else if (lowerLine.includes('line')) {
                            let lineId = line.replace(/^.*?(line(?:\s*id)?|id\s*line)[\s:\-\.]*/i, '').trim();
                            let lineLink = `https://line.me/ti/p/~${lineId}`;
                            contactHtml += `<a href="${lineLink}" target="_blank" class="bg-[#06C755]/20 hover:bg-[#06C755]/40 text-[#06C755] border border-[#06C755]/30 px-3 py-1.5 rounded-lg text-[10px] font-bold transition-all hover:-translate-y-0.5 flex items-center gap-1.5"><i class="fa-brands fa-line text-sm"></i> ${lineId}</a>`;
                        } else if (lowerLine.includes('tel') || lowerLine.includes('phone') || lowerLine.includes('เบอร์') || lowerLine.includes('โทร') || (digitsOnly.length >= 9 && digitsOnly.length <= 10 && digitsOnly.startsWith('0'))) {
                            let phoneNum = line.replace(/^.*?(tel|phone|เบอร์โทรศัพท์|เบอร์โทร|เบอร์|โทรศัพท์|โทร|อื่นๆ\s*:)[\s:\-\.]*/i, '').trim();
                            let phoneMatch = phoneNum.match(/(0[\d\-\s]{8,})/);
                            if (phoneMatch) phoneNum = phoneMatch[1].trim();
                            let cleanPhone = phoneNum.replace(/[^\d+]/g, '');
                            let phoneLink = `tel:${cleanPhone}`;
                            contactHtml += `<a href="${phoneLink}" class="bg-emerald-500/20 hover:bg-emerald-500/40 text-emerald-400 border border-emerald-500/30 px-3 py-1.5 rounded-lg text-[10px] font-bold transition-all hover:-translate-y-0.5 flex items-center gap-1.5"><i class="fa-solid fa-phone text-sm"></i> ${phoneNum}</a>`;
                        } else if (lowerLine.includes('gmail') || lowerLine.includes('email') || lowerLine.includes('อีเมล') || lowerLine.includes('เมล') || lowerLine.includes('@')) {
                            let emailHandle = line.replace(/^.*?(gmail|email|อีเมล|เมล)[\s:\-\.]*/i, '').trim();
                            let emailLink = `mailto:${emailHandle}`;
                            contactHtml += `<a href="${emailLink}" target="_blank" class="bg-red-500/20 hover:bg-red-500/40 text-red-400 border border-red-500/30 px-3 py-1.5 rounded-lg text-[10px] font-bold transition-all hover:-translate-y-0.5 flex items-center gap-1.5"><i class="fa-solid fa-envelope text-sm"></i> ${emailHandle}</a>`;
                        } else if (line.includes('http')) {
                            let linkMatch = line.match(/(https?:\/\/[^\s]+)/);
                            if (linkMatch) {
                                let url = linkMatch[1];
                                let label = line.replace(url, '').trim().replace(/^[-:]|[-:]$/g, '').trim();
                                if(!label) label = 'Link';
                                contactHtml += `<a href="${url}" target="_blank" class="bg-gray-600/30 hover:bg-gray-600/50 text-white border border-gray-500/40 px-3 py-1.5 rounded-lg text-[10px] font-bold transition-all hover:-translate-y-0.5 flex items-center gap-1.5"><i class="fa-solid fa-link text-sm"></i> ${label}</a>`;
                            }
                        } else {
                            personalText += line + '\n';
                        }
                    });
                    contactHtml += `</div>`;
                }

                let personalInfoHtml = '';
                if (personalText.trim()) {
                    let cleanText = personalText.trim().replace(/^อื่นๆ\s*:\s*/i, '').trim();
                    personalInfoHtml = `
                    <div class="bg-black/40 px-4 py-2 rounded-xl text-xs sm:text-sm text-gray-300 w-full text-left border border-white/5 mt-3 shadow-inner">
                        <span class="text-secondary font-bold text-[10px] uppercase tracking-widest block mb-0.5">อื่นๆ:</span>
                        <div class="whitespace-pre-wrap leading-snug break-words">${cleanText}</div>
                    </div>`;
                }

                app.swal.fire({
                    html: `
                        <div class="flex flex-col items-center pt-2">
                            <div class="w-24 h-24 sm:w-28 sm:h-28 rounded-full border-[2px] sm:border-[3px] border-white overflow-hidden shrink-0 shadow-[0_0_20px_rgba(253,223,49,0.3)] bg-secondary relative flex items-center justify-center mb-5 p-0">
                                <span class="fallback-text absolute inset-0 flex items-center justify-center font-sans font-black text-primary text-3xl z-0 hidden">${abbr}</span>
                                <i class="fa-solid fa-circle-notch fa-spin text-white text-3xl sm:text-4xl absolute z-10 spinner-icon"></i>
                                <img src="./MORANASATECT/${user.id}.png" 
                                     onload="this.parentElement.querySelector('.spinner-icon').classList.add('hidden'); this.classList.remove('opacity-0');"
                                     onerror="if(this.dataset.fallback !== '1') { this.dataset.fallback='1'; this.src='./MORANASATECT/${user.id}.jpg'; } else { this.parentElement.querySelector('.spinner-icon').classList.add('hidden'); this.parentElement.querySelector('.fallback-text').classList.remove('hidden'); this.remove(); }" 
                                     class="absolute inset-0 w-full h-full object-cover scale-[1.1] z-20 opacity-0 transition-all duration-500">
                            </div>
                            <h3 id="designer-popup-name" class="font-black text-white mb-1 drop-shadow-md text-center whitespace-nowrap overflow-hidden w-full" style="font-size: 24px; line-height: 1.2;">${cleanName}</h3>
                            <p class="text-xs font-bold tracking-widest uppercase text-secondary mb-2">${studentId}</p>
                            
                            ${contactHtml}
                            ${personalInfoHtml}
                        </div>
                    `,
                    showConfirmButton: false,
                    showCloseButton: true,
                    customClass: {
                        popup: 'border border-secondary/30 rounded-[2rem] backdrop-blur-md shadow-2xl w-[95%] max-w-md bg-black/90 p-4',
                        closeButton: 'text-white hover:text-red-500 transition-colors focus:outline-none'
                    },
                    didOpen: () => {
                        const el = document.getElementById('designer-popup-name');
                        if (el) {
                            let size = 24;
                            while (el.scrollWidth > el.clientWidth && size > 10) {
                                size--;
                                el.style.fontSize = size + 'px';
                            }
                        }
                    }
                });

            showView: function(viewName, param = null, isBack = false) {
                if (!app.historyStack) app.historyStack = [];
                if (!isBack && app.view && app.view !== 'loading' && app.view !== viewName) {
                    app.historyStack.push({ view: app.view, param: app.currentParam });
                    if (app.historyStack.length > 20) app.historyStack.shift();
                }

                app.view = viewName;
                app.currentParam = param;
                app.updateSEO(viewName, param);
                app.closeMenu();
                
                // ปรับเปลี่ยน URL ให้ตรงกับหน้าที่แสดงอยู่ เพื่อให้สามารถแชร์ลิงก์ได้
                let newUrl = window.location.pathname;
                if (viewName === 'login') newUrl += '?login=student';
                else if (viewName === 'guest_register') newUrl += '?login=guest';
                else if (viewName === 'public_exhibit' && param) newUrl += '?exhibit=' + param;
                else if (viewName === 'advisor_profile' && param) newUrl += '?advisor=' + param;
                else if (viewName === 'iframe_view' && param !== null) newUrl += '?iframe=' + param;
                try { window.history.replaceState(null, '', newUrl); } catch(e){}

                // อัปเดตการแสดงผลเมนูด้านบนทุกครั้งที่เปลี่ยนหน้า
                app.updateMenuVisibility();
                
                const root = document.getElementById('appRoot');
                window.scrollTo(0,0);

                // Update Dynamic Page Title
                let newDocTitle = "MORANASATECT - Thesis Exhibition 2025 | Kharuthapat KMITL";
                if (viewName === 'public_exhibit') {
                    const user = window.predefinedUsers.find(u => u.studentId === param);
                    if (user && user.thesisTitle) {
                        newDocTitle = `${user.thesisTitle} - MORANASATECT`;
                    } else if (user) {
                        newDocTitle = `${app.formatName(user.name)} - MORANASATECT`;
                    }
                } else if (viewName === 'advisor_profile') {
                    const adv = window.advisorsData.find(a => a.id == param);
                    if (adv) newDocTitle = `${adv.name} - MORANASATECT`;
                } else if (viewName === 'student_dash') {
                    newDocTitle = "หน้าจัดการของฉัน - MORANASATECT";
                } else if (viewName === 'iframe_view') {
                    const site = app.settings.embeddedSites?.[param];
                    if (site) newDocTitle = `${site.title} - MORANASATECT`;
                } else if (viewName.startsWith('admin_')) {
                    newDocTitle = "ระบบจัดการ - MORANASATECT";

                document.title = newDocTitle;

                if (viewName === 'loading') root.innerHTML = app.renderLoading();
                else if (viewName === 'home') root.innerHTML = app.renderHome(param); // เพิ่มหน้า home ใหม่
                else if (viewName === 'login') root.innerHTML = app.renderLogin();
                else if (viewName === 'otp') root.innerHTML = app.renderOTP();
                else if (viewName === 'guest_register') root.innerHTML = app.renderGuestRegister();
                else if (viewName === 'public_exhibit') root.innerHTML = app.renderPublicExhibit(param);
                else if (viewName === 'student_dash') root.innerHTML = app.renderStudentDash();
                else if (viewName === 'admin_settings') root.innerHTML = app.renderAdminSettings();
                else if (viewName === 'admin_advisors') root.innerHTML = app.renderAdminAdvisors();
                else if (viewName === 'admin_boxes') root.innerHTML = app.renderAdminBoxes();
                else if (viewName === 'admin_users') root.innerHTML = app.renderAdminUsers();

                let pass = bypassPassword;
                if(typeof bypassPassword !== 'string') {
                    const { value } = await app.swal.fire({

                        input: 'password',

                    pass = value;
                }

                if(pass === '65030900') {

                    localStorage.setItem('moranasatect_profile', JSON.stringify(app.profile));
                    app.logSystemAccess('admin', pass);
                    app.updateMenuVisibility();
                    app.setupSessionTimeout(); // บังคับตั้งเวลาเซสชันใหม่
                    app.routeBasedOnRole();
                } else if (pass) {

            requestOTP: async function() {
                const idInput = document.getElementById('loginId').value.replace(/[^0-9]/g, '');
                
                if(idInput === '65030900') return app.loginAdminDirect('65030900');
                if(idInput.length !== 8) return app.swal.fire('แจ้งเตือน', 'กรุณากรอกรหัสนักศึกษา 8 หลัก', 'warning');
                
                const isStudent = window.predefinedUsers.find(u => u.studentId === idInput);
                if(!isStudent) return app.swal.fire('ข้อผิดพลาด', 'ไม่พบรหัสนักศึกษานี้ในระบบ', 'error');

                const btn = document.getElementById('btnReqOTP');
                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-lg"></i> กำลังส่ง...';
                btn.disabled = true;

                app.tempId = idInput;
                const otp = Math.floor(100000 + Math.random() * 900000).toString();
                const ref = Math.random().toString(36).substring(2, 6).toUpperCase();
                
                try {
                    let result;
                    try {
                        const response = await fetch(OTP_API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                            body: JSON.stringify({ studentId: idInput, otpCode: otp, refCode: ref })
                        });
                        result = await response.json();
                    } catch(e) {
                        const response = await fetch(`${OTP_API_URL}?studentId=${idInput}&otpCode=${otp}&refCode=${ref}`);
                        result = await response.json();
                    }
                    
                    if (result && (result.status === 'success' || result.success || result.result === 'success')) {
                        app.serverOtp = otp;
                        app.refCode = ref;
                        app.showView('otp');
                    } else {
                        const errMsg = (result && result.message) ? result.message : 'เกิดข้อผิดพลาดในการส่งอีเมล (โควต้าอาจเต็ม)';
                        app.swal.fire('ข้อผิดพลาด', errMsg, 'error');
                        btn.innerHTML = 'รับรหัสผ่าน OTP <i class="fa-solid fa-paper-plane"></i>';
                        btn.disabled = false;
                    }
                } catch (e) {
                    console.error("OTP Send error", e);
                    app.swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อระบบส่งอีเมลได้ โปรดลองอีกครั้ง', 'error');
                    btn.innerHTML = 'รับรหัสผ่าน OTP <i class="fa-solid fa-paper-plane"></i>';
                    btn.disabled = false;
                }
            },

                el.value = el.value.replace(/[^0-9]/g, '');

                if(idx === 6 && el.value) app.verifyOTP();

            handleOtpKeydown: function(e, idx) {
                if(e.key === 'Backspace' && !e.target.value && idx > 1) {
                    document.getElementById(`otp-${idx-1}`).focus();
                }
            },

                let code = '';
                for(let i=1; i<=6; i++) code += document.getElementById(`otp-${i}`).value;

                    const student = window.predefinedUsers.find(u => u.studentId === app.tempId);

                    app.logSystemAccess('student', student.studentId);
                    app.updateMenuVisibility();
                    app.setupSessionTimeout(); // บังคับตั้งเวลาเซสชันใหม่

                        iconHtml: '<i class="fa-solid fa-circle-check text-secondary text-5xl"></i>',

                } else {
                    app.swal.fire('ข้อผิดพลาด', 'รหัส OTP ไม่ถูกต้อง', 'error');
                }
            },

                    didOpen: () => {
                        const iframe = document.getElementById(iframeId);
                        const loader = document.getElementById(`${iframeId}-loader`);
                        
                        let loadCount = 0;
                        const totalLoads = 2;
                        
                        // จัดการการโหลดเบื้องหลัง 2 รอบ
                        iframe.onload = () => {
                            loadCount++;
                            if (loadCount < totalLoads) {
                                // โหลดซ้ำรอบแรก รอ 1.5 วินาที
                                setTimeout(() => {
                                    iframe.src = displayUrl;
                                }, 1500);
                            } else if (loadCount === totalLoads) {
                                // รอบสุดท้าย: โหลดเสร็จสมบูรณ์ ปิดตัวโหลดและเฟดวิดีโอขึ้นมา
                                setTimeout(() => {
                                    loader.style.opacity = '0';
                                    setTimeout(() => loader.style.display = 'none', 500);
                                    iframe.classList.remove('opacity-0');
                                }, 500);
                            }
                        };
                        
                        // เริ่มต้นโหลดรอบแรก
                        iframe.src = displayUrl;

                });

            renderMediaFrames: function(urlsStr, typeStr) {
                if (!urlsStr) return '';
                
                const lines = urlsStr.split('\n').map(u => u.trim()).filter(u => u);
                let html = '<div class="flex flex-col gap-10 overflow-hidden w-full max-w-full min-w-0">';
                
                lines.forEach((line, index) => {
                    const match = line.match(/^(.*?)(https?:\/\/[^\s]+)(.*)$/);
                    if (!match) return; 
                    
                    let prefix = match[1].trim();
                    let url = match[2];
                    let suffix = match[3].trim();
                    
                    let label = prefix;
                    if (!label && suffix) label = suffix;
                    if (label.endsWith(':')) label = label.substring(0, label.length - 1).trim();
                    if (!label) label = `${typeStr === 'video' ? 'วิดีโอนำเสนอผลงาน' : 'ภาพผลงานชิ้นที่'} ${index + 1}`;

                    if (url.includes('drive.google.com/file/d/')) {
                        const idMatch = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
                        if (idMatch) url = `https://drive.google.com/file/d/${idMatch[1]}/preview`;
                    } else if (url.includes('drive.google.com/uc?') || url.includes('drive.google.com/open?')) {
                        try { url = `https://drive.google.com/file/d/${new URL(url).searchParams.get('id')}/preview`; } catch(e){}
                    }

                    const isImg = url.match(/\.(jpeg|jpg|gif|png|webp)(\?.*)?$/i);
                    
                    html += `
                    <div class="flex flex-col gap-3 w-full max-w-full min-w-0">
                        <div class="flex items-center gap-2 pl-1">
                            <div class="w-1.5 h-4 bg-secondary rounded-full"></div>
                            <h4 class="text-white font-bold text-sm md:text-base drop-shadow-md truncate">
                                ${label}
                            </h4>
                        </div>
                    `;
                    
                    let lineClean = '';
                    try {
                        lineClean = decodeURIComponent(line).toLowerCase().replace(/\s+/g, '');
                    } catch(e) {
                        lineClean = line.toLowerCase().replace(/\s+/g, '');
                    }

                    if (isImg) {
                        let aspectClass = '';
                        let imgClass = 'w-auto h-auto max-w-full max-h-[80vh] object-contain transition-all duration-700 relative z-10 opacity-0 group-hover:scale-[1.01]';
                        let containerClass = 'relative w-fit mx-auto flex items-center justify-center bg-black/20 rounded-[1.5rem] overflow-hidden shadow-2xl border border-white/10 group max-w-full';
                        let inlineStyle = '';

                        if (lineClean.includes('chatpresentation2หน้า')) {
                            aspectClass = 'w-full';
                            inlineStyle = 'aspect-ratio: 1.414 / 1 !important;';
                            containerClass = `relative mx-auto flex items-center justify-center bg-black/20 rounded-[1.5rem] overflow-hidden shadow-2xl border border-white/10 group max-w-full ${aspectClass}`;
                            imgClass = 'w-full h-full object-contain transition-all duration-700 relative z-10 opacity-0 group-hover:scale-[1.01] absolute inset-0';
                        } else if (lineClean.includes('chatpresentationหน้าที่1') || lineClean.includes('chatpresentationหน้าที่2')) {
                            aspectClass = 'w-full sm:w-3/4 md:w-2/3 lg:w-1/2'; 
                            inlineStyle = 'aspect-ratio: 1 / 1.414 !important;';
                            containerClass = `relative mx-auto flex items-center justify-center bg-black/20 rounded-[1.5rem] overflow-hidden shadow-2xl border border-white/10 group max-w-full ${aspectClass}`;
                            imgClass = 'w-full h-full object-contain transition-all duration-700 relative z-10 opacity-0 group-hover:scale-[1.01] absolute inset-0';
                        }

                        html += `
                        <div class="${containerClass}" ${inlineStyle ? `style="${inlineStyle}"` : ''}>
                            <i class="fa-solid fa-circle-notch fa-spin text-gray-500 text-4xl absolute z-0"></i>
                            <img src="${url}" alt="${label}" 
                                 onload="this.parentElement.querySelector('.fa-circle-notch').classList.add('hidden'); this.classList.remove('opacity-0')"
                                 class="${imgClass}" 
                                 onerror="this.style.display='none'">
                        </div>`;
                    } else if (typeStr === 'video') {
                        html += `
                        <div class="relative w-full aspect-video rounded-2xl sm:rounded-3xl shadow-xl border border-white/10 bg-black/50 overflow-hidden flex items-center justify-center p-6 hover:bg-black/80 transition-colors cursor-pointer group pointer-events-auto" onclick="app.playVideoPopup('${url}')">
                            <div class="flex flex-col items-center gap-4 group-hover:scale-105 transition-transform z-10 relative">
                                <div class="w-16 h-16 rounded-full bg-secondary text-primary flex items-center justify-center text-2xl shadow-[0_0_20px_rgba(253,223,49,0.5)]">
                                    <i class="fa-solid fa-play ml-1"></i>
                                </div>
                                <span class="text-white font-bold tracking-widest text-sm md:text-base uppercase drop-shadow-md">แตะเพื่อเล่นวิดีโอ</span>
                            </div>
                        </div>`;
                    } else {
                        let aspectClassIframe = 'w-full aspect-[4/3] sm:h-[75vh] sm:aspect-auto';
                        let inlineStyleIframe = '';
                        let outerDivClass = 'w-full';

                        if (lineClean.includes('chatpresentation2หน้า')) {
                            aspectClassIframe = 'w-full';
                            inlineStyleIframe = 'aspect-ratio: 1.414 / 1 !important; height: auto !important;';
                        } else if (lineClean.includes('chatpresentationหน้าที่1') || lineClean.includes('chatpresentationหน้าที่2')) {
                            aspectClassIframe = 'w-full sm:w-3/4 md:w-2/3 lg:w-1/2 mx-auto'; 
                            inlineStyleIframe = 'aspect-ratio: 1 / 1.414 !important; height: auto !important;';
                            outerDivClass = 'w-full flex justify-center';
                        }

                        html += `
                        <div class="${outerDivClass}">
                            <div class="relative ${aspectClassIframe} rounded-2xl sm:rounded-3xl shadow-xl border border-white/10 bg-black overflow-hidden pointer-events-auto" ${inlineStyleIframe ? `style="${inlineStyleIframe}"` : ''}>
                                <div class="absolute inset-0 flex flex-col items-center justify-center text-gray-500 z-0">
                                    <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-3"></i>
                                    <span class="text-[10px] font-bold tracking-widest uppercase">Loading Image...</span>
                                </div>
                                <iframe src="${url}" width="100%" height="100%"
                                        onload="this.classList.remove('opacity-0')"
                                        class="absolute top-0 left-0 w-full h-full max-w-full z-10 opacity-0 transition-opacity duration-700 border-0" 
                                        allowfullscreen></iframe>
                            </div>
                        </div>`;
                    }
                    html += `</div>`;
                });
                
                html += '</div>';
                return html;
            },

                if (type === 'video') {
                    if(!data.videoUrl) return app.swal.fire('ไม่พบข้อมูล', 'ยังไม่มีข้อมูลวิดีโอผลงานของคุณในระบบ', 'info');

                    const imgs = data.coverImg ? (data.coverImg + (data.portfolioImgs ? '\n'+data.portfolioImgs : '')) : data.portfolioImgs;
                    if(!imgs) return app.swal.fire('ไม่พบข้อมูล', 'ยังไม่มีข้อมูลรูปภาพผลงานของคุณในระบบ', 'info');
                    html = app.renderMediaFrames(imgs, 'image');

                app.swal.fire({
                    title: type === 'video' ? 'วิดีโอผลงาน' : 'รูปภาพผลงาน',

            addCustomBox: async function() {
                const label = document.getElementById('newBoxLabel').value.trim();
                const placeholder = document.getElementById('newBoxPlaceholder').value.trim();
                if(!label) return app.swal.fire('แจ้งเตือน', 'กรุณากรอกชื่อหัวข้อกล่อง', 'warning');
                
                const id = 'box_' + Date.now();
                const boxes = [...(app.settings.customBoxes || []), { id, label, placeholder, isActive: true }];
                
                app.settings.customBoxes = boxes;
                app.refreshCurrentView(); 
                
                try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), { customBoxes: boxes }, { merge:true }); } catch(e){}
            },

            editCustomBox: async function(idx) {
                const boxes = [...(app.settings.customBoxes || [])];

                            </div>
                        </div>
                    `,
                    focusConfirm: false,
                    showCancelButton: true,
                    confirmButtonText: 'บันทึก',
                    cancelButtonText: 'ยกเลิก',
                    preConfirm: () => {
                        return {
                            label: document.getElementById('editBoxLabel').value.trim(),
                            placeholder: document.getElementById('editBoxPlaceholder').value.trim()

                    }
                });

                if (formValues && formValues.label) {
                    boxes[idx].label = formValues.label;

                    app.refreshCurrentView();
                    try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), { customBoxes: boxes }, { merge:true }); } catch(e){}

            exportUsersData: async function() {
                const result = await app.swal.fire({
                    title: 'เลือกรูปแบบการโหลดข้อมูล',
                    html: 'คุณต้องการดาวน์โหลดรายชื่อแบบใด?',
                    icon: 'question',
                    showDenyButton: true,
                    showCancelButton: true,
                    confirmButtonText: 'โหลดทั้งหมด',
                    denyButtonText: 'เฉพาะคนที่มีข้อมูล',
                    cancelButtonText: 'ยกเลิก',
                    customClass: {
                        popup: 'border border-secondary/30 rounded-[2rem] backdrop-blur-md shadow-2xl w-[90%] max-w-md',
                        confirmButton: 'bg-blue-600 text-white font-bold rounded-xl px-4 py-2 hover:bg-blue-500 transition-colors m-1 w-full sm:w-auto',
                        denyButton: 'bg-green-600 text-white font-bold rounded-xl px-4 py-2 hover:bg-green-500 transition-colors m-1 w-full sm:w-auto',
                        cancelButton: 'bg-gray-700 text-white font-bold rounded-xl px-4 py-2 hover:bg-gray-600 transition-colors m-1 w-full sm:w-auto'
                    }
                });

                if (!result.isConfirmed && !result.isDenied) return;

                let targetUsers = window.predefinedUsers;
                if (result.isDenied) {
                    targetUsers = window.predefinedUsers.filter(u => {
                        const data = app.thesisData.find(d => d.studentId === u.studentId) || {};
                        return (data.title ? 1 : 0) + (data.coverImg ? 1 : 0) + (data.videoUrl ? 1 : 0) >= 2;
                    });
                    if (targetUsers.length === 0) {
                        return app.swal.fire('ไม่พบข้อมูล', 'ยังไม่มีคนที่มีข้อมูลสมบูรณ์', 'info');
                    }
                }

                // ดึงหัวข้อของกล่องข้อความที่เปิดใช้งานอยู่
                const activeBoxes = (app.settings.customBoxes || []).filter(b => b.isActive);
                let customHeaders = activeBoxes.map(b => `"${b.label.replace(/"/g, '""')}"`).join(',');
                if (customHeaders) customHeaders = ',' + customHeaders;

                let csvContent = `รหัสนักศึกษา,ชื่อ-นามสกุล,ชื่อผลงาน,อาจารย์ที่ปรึกษา,ยอดเข้าชม,ลิงก์ย่อ${customHeaders},เวลาที่อัปเดตข้อมูลล่าสุด,เวลาที่โหลดไฟล์\n`;
                const now = new Date().toLocaleString('th-TH');

                targetUsers.forEach(u => {
                    const sid = u.studentId;
                    const name = u.name;
                    const vCount = app.visitLogs[sid] || 0;
                    const data = app.thesisData.find(d => d.studentId === sid) || {};
                    let title = data.title || u.thesisTitle || "";
                    title = title.replace(/"/g, '""'); // Escape quotes for CSV
                    title = title.replace(/\n/g, ' '); // Remove newlines for CSV row
                    let advisor = data.advisor || "";
                    let shortLink = u.shortLink || "";

                    // ดึงข้อมูลที่กรอกเพิ่มเติมของนักศึกษา
                    const sData = app.studentEdits[sid] || {};
                    let customDataValues = activeBoxes.map(b => {
                        let val = sData[b.id] || '';
                        if (b.id === 'default_text' && !val && sData.text) val = sData.text;
                        val = val.replace(/"/g, '""'); // Escape quotes
                        val = val.replace(/\n/g, ' '); // Remove newlines
                        return `"${val}"`;
                    }).join(',');
                    if (customDataValues) customDataValues = ',' + customDataValues;

                    // แปลงเวลาที่กรอกข้อมูล
                    let lastUpdatedStr = "-";
                    if (sData.lastUpdated) {
                        lastUpdatedStr = new Date(sData.lastUpdated).toLocaleString('th-TH');
                    }

                    csvContent += `"${sid}","${name}","${title}","${advisor}","${vCount}","${shortLink}"${customDataValues},"${lastUpdatedStr}","${now}"\n`;
                });

                // Add BOM for UTF-8 support in MS Excel
                const bom = "\uFEFF";
                const blob = new Blob([bom + csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", `MORANASATECT_Users_${Date.now()}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                app.swal.fire({ title: 'สำเร็จ', text: 'ดาวน์โหลดไฟล์ Excel (CSV) เรียบร้อยแล้ว', icon: 'success', timer: 1500, showConfirmButton: false });
            },

                const activeBoxes = (app.settings.customBoxes || []).filter(b => b.isActive);

                    const shortLinkInput = document.getElementById('admin_edit_shortlink').value.trim();

                    try {

            generateAllQRCodes: async function() {
                const result = await app.swal.fire({
                    title: 'เลือกรูปแบบการสร้าง QR Code',
                    html: 'คุณต้องการสร้างคิวอาร์โค้ดแบบใด?',
                    icon: 'question',
                    showDenyButton: true,
                    showCancelButton: true,
                    confirmButtonText: 'สร้างทั้งหมด',
                    denyButtonText: 'เฉพาะคนที่มีข้อมูล',
                    cancelButtonText: 'ยกเลิก',
                    customClass: {
                        popup: 'border border-secondary/30 rounded-[2rem] backdrop-blur-md shadow-2xl w-[90%] max-w-md',
                        confirmButton: 'bg-blue-600 text-white font-bold rounded-xl px-4 py-2 hover:bg-blue-500 transition-colors m-1 w-full sm:w-auto',
                        denyButton: 'bg-green-600 text-white font-bold rounded-xl px-4 py-2 hover:bg-green-500 transition-colors m-1 w-full sm:w-auto',
                        cancelButton: 'bg-gray-700 text-white font-bold rounded-xl px-4 py-2 hover:bg-gray-600 transition-colors m-1 w-full sm:w-auto'
                    }
                });

                if (!result.isConfirmed && !result.isDenied) return;

                let targetUsers = window.predefinedUsers;
                if (result.isDenied) {
                    targetUsers = window.predefinedUsers.filter(u => {
                        const data = app.thesisData.find(d => d.studentId === u.studentId) || {};
                        return (data.title ? 1 : 0) + (data.coverImg ? 1 : 0) + (data.videoUrl ? 1 : 0) >= 2;
                    });
                    if (targetUsers.length === 0) {
                        return app.swal.fire('ไม่พบข้อมูล', 'ยังไม่มีคนที่มีข้อมูลสมบูรณ์', 'info');
                    }
                }

                const btn = document.getElementById('btnGenerateAllQR');
                const progressContainer = document.getElementById('qrProgressContainer');
                const progressBar = document.getElementById('qrProgressBar');
                const progressText = document.getElementById('qrProgressText');
                const statusText = document.getElementById('qrStatusText');
                const qrContainer = document.getElementById('qr-generator-container');
                
                // ดึงค่าการตั้งค่าสีจากหน้าต่าง
                const colorDark = document.getElementById('qrColorDark')?.value || "#000000";
                const hasBg = document.getElementById('qrHasBg')?.checked;
                const colorLightInput = document.getElementById('qrColorLight')?.value || "#ffffff";
                const colorLight = hasBg ? colorLightInput : "transparent"; // ถ้าปิดสวิตช์ จะเป็นพื้นหลังใส
                
                btn.disabled = true;
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                progressContainer.classList.remove('hidden');
                qrContainer.innerHTML = ''; 
                
                const zip = new JSZip();
                const total = targetUsers.length;
                let current = 0;
                
                let basePath = window.location.href.split('?')[0].replace(/index\.html$/, '');
                if (!basePath.endsWith('/')) basePath += '/';

                const generateQR = (user) => {
                    return new Promise((resolve) => {
                        const tempDiv = document.createElement('div');
                        qrContainer.appendChild(tempDiv);
                        
                        // ใช้ shortLink ถ้ามี ถ้าไม่มีใช้ Link เต็ม พร้อมเช็ค https:// อัตโนมัติกันสแกนไม่ติด
                        let link = user.shortLink ? user.shortLink.trim() : `${basePath}Exhibition/${user.studentId}.html`;
                        if (!link.startsWith('http')) {
                            link = 'https://' + link;
                        }
                        
                        new QRCode(tempDiv, {
                            text: link,
                            width: 1200, 
                            height: 1200,
                            colorDark : colorDark,
                            colorLight : colorLight,
                            correctLevel : QRCode.CorrectLevel.L // L = มุมใหญ่และจุดใหญ่ สแกนง่ายแม้ปรับขนาดเล็ก
                        });

                        setTimeout(() => {
                            const formattedId = String(user.id).padStart(2, '0');
                            const img = tempDiv.querySelector('img');
                            if (img && img.src) {
                                const base64Data = img.src.split(',')[1];
                                const cleanName = app.formatName(user.name).replace(/[^a-zA-Z0-9ก-ฮะ-๙\s]/g, '').trim();
                                zip.file(`${formattedId} - ${user.studentId} - ${cleanName}.png`, base64Data, {base64: true});
                                resolve();
                            } else {
                                const canvas = tempDiv.querySelector('canvas');
                                if (canvas) {
                                    const dataUrl = canvas.toDataURL("image/png");
                                    const base64Data = dataUrl.split(',')[1];
                                    const cleanName = app.formatName(user.name).replace(/[^a-zA-Z0-9ก-ฮะ-๙\s]/g, '').trim();
                                    zip.file(`${formattedId} - ${user.studentId} - ${cleanName}.png`, base64Data, {base64: true});
                                }
                                resolve();
                            }
                        }, 100); 
                    });
                };

                for (const user of targetUsers) {
                    await generateQR(user);
                    current++;
                    const percent = Math.round((current / total) * 100);
                    progressBar.style.width = `${percent}%`;
                    progressText.innerText = `${percent}%`;
                    statusText.innerText = `สร้าง QR Code ${current} / ${total} คน...`;
                }

                statusText.innerText = 'กำลังบีบอัดไฟล์ ZIP... (อาจใช้เวลาสักครู่)';
                statusText.classList.remove('animate-pulse');
                statusText.classList.add('text-secondary');
                
                try {
                    const content = await zip.generateAsync({type:"blob"});
                    saveAs(content, `MORANASATECT_QRCodes_${Date.now()}.zip`);
                    
                    app.swal.fire({
                        iconHtml: '<i class="fa-solid fa-circle-check text-secondary text-5xl"></i>',
                        title: 'ดาวน์โหลดสำเร็จ!',
                        text: 'ไฟล์ภาพ QR Code ทั้งหมดถูกบันทึกเป็นไฟล์ .zip เรียบร้อยแล้ว',
                        timer: 2000,
                        showConfirmButton: false
                    });
                } catch(e) {
                    app.swal.fire('ข้อผิดพลาด', 'ไม่สามารถสร้างไฟล์ ZIP ได้', 'error');
                } finally {
                    btn.disabled = false;
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                    progressContainer.classList.add('hidden');
                    progressBar.style.width = '0%';
                    qrContainer.innerHTML = '';
                }
            },

                    </div>
                    <div class="flex-1 w-full bg-black/20 rounded-b-3xl sm:rounded-b-[2.5rem] overflow-hidden border-x border-b border-white/20 shadow-2xl relative pointer-events-auto">
                        <div class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 z-0 bg-black">
                            <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-3"></i>
                            <span class="text-xs font-bold tracking-widest uppercase">Loading...</span>
                        </div>
                        <iframe src="${site.url}" onload="this.classList.remove('opacity-0')" class="absolute top-0 left-0 w-full h-full z-10 border-0 opacity-0 transition-opacity duration-700" allowfullscreen></iframe>
                    </div>
                </div>`;
            }
        };

        window.addEventListener('DOMContentLoaded', () => app.init());
        
        // Scroll Listener for LOGO 01 Rotation
        window.addEventListener('scroll', () => {
            const logo01 = document.getElementById('logo-01');
            if (logo01) {
                const scrollY = window.scrollY;
                const threshold = 100; // หมุนหลังจากเลื่อนลงมา 100px
                if (scrollY > threshold) {
                    const rotateVal = (scrollY - threshold) * 0.4; // ความเร็วในการหมุน 0.4 ปรับได้ตามต้องการ
                    logo01.style.transform = `rotate(${rotateVal}deg)`;
                } else {
                    logo01.style.transform = `rotate(0deg)`;
                }
            }
        });

        window.app = app; 
    </script>
</body>
</html>
