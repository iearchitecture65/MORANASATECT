            fetchThesisData: async function() {
                try {
                    const res = await fetch(SHEET_CSV_URL + "&t=" + Date.now());
                    const csvText = await res.text();
                    const parsed = this.parseCSV(csvText);
                    
                    if (parsed.length > 1) {
                        const headers = parsed[0];
                        const dataRows = parsed.slice(1);
                        
                        const prefixes = ['1.1', '1.2', '1.3', '2.1', '2.2', '2.3', '2.4', '3.1', '3.2', '3.3', '4.1', '5.1', '5.2', '5.3', '5.4'];
                        const headerMap = {};
                        prefixes.forEach(p => headerMap[p] = []);

                        headers.forEach((header, index) => {
                            prefixes.forEach(p => { 
                                const regex = new RegExp(`(^|\\s)${p}(\\s|:|\\.|$)`);
                                if (regex.test(header)) headerMap[p].push(index); 
                            });
                        });
                        
                        this.thesisData = dataRows.map(row => {
                            let obj = {};
                            prefixes.forEach(p => {
                                let values = headerMap[p].map(idx => row[idx] ? row[idx].trim() : '').filter(v => v !== '');
                                obj[p] = values.join('\n\n'); 
                            });
                            // Map for easier access
                            obj.studentId = obj['1.1'];
                            obj.name = obj['1.2'];
                            obj.personalInfo = obj['1.3'];
                            obj.title = obj['2.1'];
                            obj.advisor = obj['2.2'];
                            obj.category = obj['2.3'];
                            obj.description = obj['2.4'];
                            obj.coverImg = obj['3.1'];
                            obj.portfolioImgs = obj['3.3'];
                            obj.videoUrl = obj['4.1'];
                            obj.facebook = obj['5.1'];
                            obj.instagram = obj['5.2'];
                            obj.otherContact = [obj['5.3'], obj['5.4']].filter(Boolean).join('\n');
                            return obj;
                        }).filter(r => r.studentId);
                    }
                } catch (e) {
                    console.error("CSV Fetch Error", e);
                }
            },

            parseCSV: function(str) {
                const arr = [];
                let quote = false;
                let row = 0, col = 0;
                for (let c = 0; c < str.length; c++) {
                    let cc = str[c], nc = str[c+1];
                    arr[row] = arr[row] || [];
                    arr[row][col] = arr[row][col] || '';
                    if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                    if (cc == '"') { quote = !quote; continue; }
                    if (cc == ',' && !quote) { ++col; continue; }
                    if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                    if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                    if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                    arr[row][col] += cc;
                }
                return arr;
            },

            formatThesisTitle: function(title) {
                if (!title) return '<span class="text-xl md:text-2xl font-black block">กำลังจัดทำวิทยานิพนธ์</span>';
                
                let parts = title.split('\n');
                if (parts.length > 1) {
                    return `<span class="text-xl md:text-2xl font-black block leading-snug">${parts[0]}</span><span class="block text-sm md:text-base text-gray-400 mt-2 font-medium">${parts.slice(1).join(' ')}</span>`;
                }
                
                const bracketMatch = title.match(/^(.*?)(\([^)]+\))$/);
                if (bracketMatch) {
                    return `<span class="text-xl md:text-2xl font-black block leading-snug">${bracketMatch[1].trim()}</span><span class="block text-sm md:text-base text-gray-400 mt-2 font-medium">${bracketMatch[2].trim()}</span>`;
                }

                const engMatch = title.match(/([a-zA-Z0-9\s\-:,'".&]+)$/);
                if (engMatch && engMatch[1].trim().length > 3 && engMatch[1].trim() !== title.trim()) {
                    const thaiPart = title.replace(engMatch[1], '').trim();
                    const engPart = engMatch[1].trim();
                    if (thaiPart) {
                        return `<span class="text-xl md:text-2xl font-black block leading-snug">${thaiPart}</span><span class="block text-sm md:text-base text-gray-400 mt-2 font-medium">${engPart}</span>`;
                    }
                }
                
                return `<span class="text-xl md:text-2xl font-black block leading-snug">${title}</span>`;
            },

            sharePublicLink: async function(studentId) {
                const baseUrl = window.location.href.split('?')[0];
                const link = `${baseUrl}?exhibit=${studentId}`;
                
                const showFallbackCopy = () => {
                    this.swal.fire({
                        title: 'แชร์ลิงก์ผลงาน',
                        html: `
                            <input type="text" value="${link}" class="w-full p-4 rounded-xl text-center text-sm text-primary font-bold bg-white outline-none border-2 border-secondary" readonly id="copyLinkInput">
                            <p class="text-xs text-gray-400 mt-3">คัดลอกลิงก์ด้านบนเพื่อแชร์ให้เพื่อนๆ</p>`,
                        confirmButtonText: 'คัดลอกลิงก์',
                        showCancelButton: true,
                        cancelButtonText: 'ปิดหน้าต่าง'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            const input = document.getElementById('copyLinkInput');
                            if(input) {
                                input.select();
                                document.execCommand('copy');
                                this.swal.fire({ title: 'คัดลอกสำเร็จ!', text: 'นำลิงก์ไปแชร์ได้เลย', iconHtml: '<i class="fa-solid fa-circle-check text-secondary text-5xl"></i>', timer: 1500, showConfirmButton: false });
                            }
                        }
                    });
                };

                if (navigator.share) {
                    try { 
                        await navigator.share({ 
                            title: 'MORANASATECT Thesis Exhibition', 
                            text: 'ชมนิทรรศการผลงานวิทยานิพนธ์',
                            url: link 
                        }); 
                    } catch(e) {
                        if (e.name !== 'AbortError') showFallbackCopy();
                    }
                } else {
                    try {
                        if (navigator.clipboard && navigator.clipboard.writeText) {
                            await navigator.clipboard.writeText(link);
                            this.swal.fire({ title: 'คัดลอกลิงก์แล้ว!', text: 'นำลิงก์ไปแชร์ได้เลย', iconHtml: '<i class="fa-solid fa-circle-check text-secondary text-5xl"></i>', timer: 1500, showConfirmButton:false });
                        } else {
                            throw new Error("Clipboard API not available");
                        }
                    } catch (err) {
                        try {
                            const textArea = document.createElement("textarea");
                            textArea.value = link;
                            document.body.appendChild(textArea);
                            textArea.select();
                            document.execCommand('copy');
                            document.body.removeChild(textArea);
                            this.swal.fire({ title: 'คัดลอกลิงก์แล้ว!', text: 'นำลิงก์ไปแชร์ได้เลย', iconHtml: '<i class="fa-solid fa-circle-check text-secondary text-5xl"></i>', timer: 1500, showConfirmButton:false });
                        } catch (err2) {
                            showFallbackCopy();
                        }
                    }
                }
            },

            // --- ส่วน Render Iframe แบบไม่มีกล่อง ---
            renderMediaFrames: function(urlsStr, typeStr) {
                if (!urlsStr) return '';
                
                const lines = urlsStr.split('\n').map(u => u.trim()).filter(u => u);
                let html = '<div class="flex flex-col gap-8">';
                
                lines.forEach((line, index) => {
                    const match = line.match(/^(.*?)(https?:\/\/[^\s]+)(.*)$/);
                    if (!match) return; 
                    
                    let prefix = match[1].trim();
                    let url = match[2];
                    
                    let label = prefix;
                    if (label.endsWith(':')) label = label.substring(0, label.length - 1).trim();
                    if (!label) label = `${typeStr === 'video' ? 'วิดีโอนำเสนอผลงาน' : 'ภาพผลงานชิ้นที่'} ${index + 1}`;

                    if (url.includes('drive.google.com/file/d/')) {
                        const idMatch = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
                        if (idMatch) url = `https://drive.google.com/file/d/${idMatch[1]}/preview`;
                    } else if (url.includes('drive.google.com/uc?') || url.includes('drive.google.com/open?')) {
                        try { url = `https://drive.google.com/file/d/${new URL(url).searchParams.get('id')}/preview`; } catch(e){}
                    }

                    const isImg = url.match(/\.(jpeg|jpg|gif|png|webp)(\?.*)?$/i);
                    
                    html += `
                    <div class="flex flex-col gap-3">
                        <h4 class="text-secondary font-bold text-sm md:text-base flex items-center gap-2 pl-1 drop-shadow-md">
                            <i class="fa-solid fa-play text-xs opacity-70"></i> ${label}
                        </h4>
                    `;
                    
                    if (isImg) {
                        html += `
                        <div class="relative w-full flex items-center justify-center min-h-[200px]">
                            <i class="fa-solid fa-circle-notch fa-spin text-gray-500 text-3xl absolute z-0"></i>
                            <img src="${url}" alt="${label}" 
                                 onload="this.classList.remove('opacity-0')"
                                 class="max-w-full max-h-[80vh] rounded-2xl shadow-xl border border-white/10 object-contain transition-all duration-700 relative z-10 opacity-0" 
                                 onerror="this.style.display='none'">
                        </div>`;
                    } else {
                        html += `
                        <div class="relative w-full h-[60vh] md:h-[80vh] flex items-center justify-center rounded-2xl shadow-xl border border-white/10 bg-black overflow-hidden">
                            <div class="absolute inset-0 flex flex-col items-center justify-center text-gray-500 z-0">
                                <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3"></i>
                                <span class="text-[10px] font-bold tracking-widest uppercase">Loading Media...</span>
                            </div>
                            <iframe src="${url}" 
                                    onload="this.classList.remove('opacity-0')"
                                    class="w-full h-full relative z-10 opacity-0 transition-opacity duration-700 border-0" 
                                    allow="autoplay" allowfullscreen loading="lazy"></iframe>
                        </div>`;
                    }
                    html += `</div>`;
                });
                
                html += '</div>';
                return html;
            },

            // ================== PAGE: PUBLIC EXHIBIT ==================
            renderPublicExhibit: function(studentId) {
                const user = predefinedUsers.find(u => u.studentId === studentId);
                if(!user) return `<div class="text-center mt-20 text-red-500 font-bold bg-red-500/10 p-6 rounded-2xl border border-red-500/20 max-w-md mx-auto shadow-lg"><i class="fa-solid fa-triangle-exclamation text-4xl mb-3"></i><br>ไม่พบข้อมูลรหัสนักศึกษานี้</div>`;
                
                const data = this.thesisData.find(d => d.studentId === studentId) || {};
                const visitCount = this.visitLogs[studentId] || 0;

                const cleanName = this.formatName(data.name || user.name);
                const abbr = this.getAbbr(cleanName);

                let rawContactInfo = data.personalInfo || '';
                let contactHtml = '';
                let personalText = '';

                if (rawContactInfo) {
                    contactHtml += `<div class="mt-5 pt-5 border-t border-white/10 flex flex-wrap gap-2 justify-center sm:justify-start">`;
                    const lines = rawContactInfo.split('\n').map(l => l.trim()).filter(l => l);
                    
                    lines.forEach(line => {
                        const lowerLine = line.toLowerCase();
                        if (lowerLine.startsWith('ig') || lowerLine.startsWith('instagram')) {
                            let igHandle = line.replace(/^(ig|instagram)[\s:\-\.]*/i, '').trim();
                            let cleanIgHandle = igHandle.replace(/^[_]+/, '').trim();
                            let igLink = cleanIgHandle.includes('http') ? cleanIgHandle : `https://instagram.com/${cleanIgHandle.replace(/^[@\s]+/, '')}`;
                            
                            contactHtml += `<a href="${igLink}" target="_blank" class="bg-gradient-to-r from-[#833ab4]/20 via-[#fd1d1d]/20 to-[#fcb045]/20 hover:from-[#833ab4]/40 hover:via-[#fd1d1d]/40 hover:to-[#fcb045]/40 text-[#ff7b9c] border border-[#E4405F]/30 px-3 py-1.5 rounded-lg text-[10px] font-bold transition-all hover:-translate-y-0.5 flex items-center gap-1.5"><i class="fa-brands fa-instagram text-sm"></i> ${igHandle}</a>`;

                const baseUrl = `${window.location.origin}${window.location.pathname}?exhibit=`;

                for (let i = 0; i < predefinedUsers.length; i++) {
                    const u = predefinedUsers[i];
                    container.innerHTML = ''; 
                    
                    const url = baseUrl + u.studentId;
                    new QRCode(container, {
                        text: url,
                        width: 1000, // High res for printing
                        height: 1000,
                        colorDark: "#000000",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });

                    await new Promise(r => setTimeout(r, 100));
                    
                    const canvas = container.querySelector('canvas');
                    if (canvas) {
                        const imgData = canvas.toDataURL("image/png").replace(/^data:image\/(png|jpg);base64,/, "");
                        zip.file(`${u.studentId}_${u.name.replace(/ /g, '_')}.png`, imgData, {base64: true});
                    }
                }

                zip.generateAsync({type:"blob"}).then(function(content) {
                    saveAs(content, "MORANASATECT_QRCodes.zip");
                    btn.innerHTML = '<i class="fa-solid fa-check text-lg"></i> ดาวน์โหลดสำเร็จ';
                    setTimeout(() => {
                        btn.innerHTML = '<i class="fa-solid fa-file-zipper text-lg"></i> เริ่มดาวน์โหลด';
                        btn.disabled = false;
                    }, 3000);
                });
            },

            // ================== PAGE: IFRAME VIEW ==================
            renderIframeView: function(idxStr) {
                const idx = parseInt(idxStr);
                const sites = this.settings.embeddedSites || [];
                const site = sites[idx];

                if (!site) return `<div class="text-center mt-20 text-red-500 font-bold bg-red-500/10 p-6 rounded-2xl border border-red-500/20 max-w-md mx-auto"><i class="fa-solid fa-link-slash text-4xl mb-3"></i><br>ไม่พบหน้าเว็บนี้</div>`;

                return `
                <div class="animate-fade-in flex flex-col h-[85vh]">
                    <div class="flex items-center gap-4 mb-4 bg-black/60 p-4 rounded-3xl border border-white/10 backdrop-blur-xl shadow-lg">
                        <div class="min-w-0 pl-2">
                            <h2 class="text-white font-bold text-sm sm:text-base truncate"><i class="fa-solid fa-arrow-up-right-from-square text-secondary mr-2"></i>${site.title}</h2>
                        </div>
                    </div>
                    <div class="flex-1 bg-white rounded-[2rem] overflow-hidden border border-white/20 shadow-2xl relative flex items-center justify-center">
                        <div class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 z-0 bg-black">
                            <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-3"></i>
                            <span class="text-xs font-bold tracking-widest uppercase">Loading...</span>
                        </div>
                        <iframe src="${site.url}" onload="this.classList.remove('opacity-0')" class="w-full h-full relative z-10 border-0 opacity-0 transition-opacity duration-700" allowfullscreen></iframe>
                    </div>
                </div>`;
            }
        };

        window.addEventListener('DOMContentLoaded', () => app.init());
        window.app = app; 
    </script>
</body>
</html>
